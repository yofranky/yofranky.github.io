      /* Smooth styles, transitions and Brutalist styling */
      .font-serif {
        font-family: 'Playfair Display', Georgia, serif;
      }
      .font-natural-serif {
        font-family: 'Lora', Georgia, serif;
      }
      .font-sans {
        font-family: 'Inter', sans-serif;
      }
      .font-mono {
        font-family: 'JetBrains Mono', monospace;
      }
      .font-space {
        font-family: 'Space Grotesk', sans-serif;
      }
      .font-syne {
        font-family: 'Syne', sans-serif;
      }
      
      /* Brutalist rugged drop-shadows */
      .brutalist-border {
        border: 4px solid #000000;
      }
      .brutalist-shadow {
        box-shadow: 6px 6px 0px 0px rgba(0,0,0,1);
      }
      .brutalist-shadow-sm {
        box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
      }
      
      /* Transition systems */
      .custom-transition {
        transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      }
      
      /* Fade in animation for layout transitions */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in {
        animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      
      /* Scrollbar tweaks */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }

      /* Print and PDF Export optimizations */
      @media print {
        body {
          background-color: #ffffff !important;
          color: #111111 !important;
          overflow: visible !important;
        }
        /* Hide floating and interactive UI parts */
        .fixed, #share-menu, button[onclick="toggleShareMenu()"] {
          display: none !important;
        }
        /* Simplify grid layouts and avoid clipping */
        .grid {
          display: grid !important;
          gap: 1.5rem !important;
        }
        section, article, .card {
          page-break-inside: avoid !important;
          break-inside: avoid !important;
        }
        /* Expand case studies text for the printing recruiter */
        .overflow-hidden, .line-clamp-3, .line-clamp-4 {
          overflow: visible !important;
          display: block !important;
          -webkit-line-clamp: unset !important;
        }
      }

      function isLayoutLocked(layout) { return layout !== FREE_LAYOUT; }
      function isStyleLocked(style) { return style !== FREE_STYLE; }

      // Recruiter Interaction Tracking Telemetry Function
      function trackRecruiterInteraction(actionName, elementLocation) {
        const trackingUrl = appState.identity.tracking_url;
        if (!trackingUrl) return; // fail silently and gracefully

        const currentActiveTheme = `${appState.activeLayout}_${appState.activeStyle}`;
        const payload = {
          action: actionName,
          location: elementLocation,
          theme: currentActiveTheme,
          timestamp: new Date()
        };

        try {
          const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
          navigator.sendBeacon(trackingUrl, blob);
        } catch (err) {
          // Fail silently and gracefully without console errors
        }
      }

      // Case Study Expander toggler with telemetric tracking hook
      function toggleCaseStudy(studyId, title) {
        appState.expandedStudies[studyId] = !appState.expandedStudies[studyId];
        const isExpanded = appState.expandedStudies[studyId];
        trackRecruiterInteraction(isExpanded ? 'expand_case_study' : 'collapse_case_study', title);
        renderApp();
      }

      function setupControlPanelEventListeners() {
        const toggleBtn = document.getElementById('panel-toggle-btn');
        const panelCard = document.getElementById('panel-card');
        const closeBtn = document.getElementById('panel-close-btn');

        if (toggleBtn && panelCard) {
          toggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            panelCard.classList.toggle('hidden');
          });
        }

        if (closeBtn && panelCard) {
          closeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            panelCard.classList.add('hidden');
          });
        }

        // Close share menu if clicked outside
        document.removeEventListener('click', handleOutsideClick);
        document.addEventListener('click', handleOutsideClick);
      }

      function handleOutsideClick(e) {
        const shareMenu = document.getElementById('share-menu');
        if (shareMenu && !shareMenu.classList.contains('hidden')) {
          const clickedOnShareTrigger = e.target.closest('button[onclick="toggleShareMenu()"]');
          const clickedOnShareMenu = shareMenu.contains(e.target);
          if (!clickedOnShareTrigger && !clickedOnShareMenu) {
            shareMenu.classList.add('hidden');
          }
        }
      }

      window.setRecruiterView = function(val) {
        appState.isRecruiterView = val;
        trackRecruiterInteraction(val ? 'enter_recruiter_view' : 'exit_recruiter_view', 'Top Bar Toggle');
        
        const actionButtons = document.getElementById('bottom-action-buttons');

        // Hide sandbox panel if recruiter view is activated
        if (appState.isRecruiterView) {
            if (actionButtons) actionButtons.classList.add('hidden');
            const panel = document.getElementById('sandbox-panel');
            if (panel && !panel.classList.contains('hidden')) {
                panel.classList.add('hidden');
                panel.classList.remove('flex');
            }
        } else {
            if (actionButtons) actionButtons.classList.remove('hidden');
        }
        
        renderApp();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      // SEO and Structured Schema.org update system
      function updateSEOAndStructuredData() {
        const id = appState.identity;
        if (!id) return;

        const name = id.name || "Alexander Vance";
        const title = id.title || "Principal Systems Architect";
        const bio = id.bio || "Discover my professional portfolio, STAR-method case studies, and career journey.";
        const avatar = id.avatar || "";
        const email = id.email || "";
        const location = id.location || "";
        const currentUrl = window.location.href;

        // 1. Dynamic Page Document Title
        document.title = `${name} | ${title} - Portfolio`;

        // 2. Standard Meta tags
        const descMeta = document.getElementById('seo-description');
        if (descMeta) descMeta.setAttribute('content', bio);

        const authorMeta = document.getElementById('seo-author');
        if (authorMeta) authorMeta.setAttribute('content', name);

        const canonicalTag = document.getElementById('seo-canonical');
        if (canonicalTag) canonicalTag.setAttribute('href', currentUrl);

        // 3. Open Graph (OG) sharing tags
        const ogTitle = document.getElementById('og-title');
        if (ogTitle) ogTitle.setAttribute('content', `${name} | ${title}`);

        const ogDesc = document.getElementById('og-description');
        if (ogDesc) ogDesc.setAttribute('content', bio);

        const ogUrl = document.getElementById('og-url');
        if (ogUrl) ogUrl.setAttribute('content', currentUrl);

        if (avatar) {
          const ogImg = document.getElementById('og-image');
          if (ogImg) ogImg.setAttribute('content', avatar);
          const twitterImg = document.getElementById('twitter-image');
          if (twitterImg) twitterImg.setAttribute('content', avatar);
        }

        // 4. Twitter tags
        const twTitle = document.getElementById('twitter-title');
        if (twTitle) twTitle.setAttribute('content', `${name} - ${title}`);

        const twDesc = document.getElementById('twitter-description');
        if (twDesc) twDesc.setAttribute('content', bio);

        // 5. Dynamic JSON-LD Structured Data Schema (Schema.org Person metadata)
        const schemaScript = document.getElementById('seo-json-ld');
        if (schemaScript) {
          const sameAsArray = [];
          if (id.linkedin) sameAsArray.push(id.linkedin);
          if (id.github) sameAsArray.push(id.github);

          const schema = {
            "@context": "https://schema.org",
            "@type": "ProfilePage",
            "dateCreated": "2026-06-27T19:00:00Z",
            "mainEntity": {
              "@type": "Person",
              "name": name,
              "jobTitle": title,
              "description": bio,
              "image": avatar || undefined,
              "email": email || undefined,
              "address": location ? {
                "@type": "PostalAddress",
                "addressLocality": location.split(',')[0]?.trim(),
                "addressRegion": location.split(',')[1]?.trim() || undefined
              } : undefined,
              "sameAs": sameAsArray.length > 0 ? sameAsArray : undefined
            }
          };
          schemaScript.textContent = JSON.stringify(schema, null, 2);
        }
      }
