<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All STAR Stories — Franky Barragan</title>
<meta name="description" content="Full set of STAR-method case studies from Franky Barragan's career in infrastructure engineering and community leadership.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { darkMode: 'class' };
</script>
<style>
  body { font-family: 'Inter', sans-serif; }
  .gradient-text {
    background: linear-gradient(90deg, #005A9C 0%, #4f46e5 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .star-body {
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    transition: max-height 0.4s ease, opacity 0.3s ease, margin 0.4s ease;
  }
  .star-body.open {
    max-height: 800px;
    opacity: 1;
    margin-top: 1rem;
  }
</style>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 antialiased transition-colors">

  <!-- Theme Switcher -->
  <div class="fixed bottom-6 left-6 z-40">
    <div class="flex items-center space-x-1 bg-white/90 dark:bg-zinc-900/90 backdrop-blur-md border border-zinc-200 dark:border-zinc-800 p-1 rounded-full shadow-lg">
      <button onclick="setThemeOverride('light')" id="btn-theme-light" class="p-2 rounded-full transition-colors" title="Light Mode">☀️</button>
      <button onclick="setThemeOverride('auto')" id="btn-theme-auto" class="p-2 rounded-full transition-colors" title="System Auto">🖥️</button>
      <button onclick="setThemeOverride('dark')" id="btn-theme-dark" class="p-2 rounded-full transition-colors" title="Dark Mode">🌙</button>
    </div>
  </div>

  <div class="max-w-4xl mx-auto px-4 py-16 md:py-24 space-y-10">

    <!-- HEADER -->
    <header class="text-center space-y-4 max-w-2xl mx-auto">
      <a href="./" class="inline-block text-xs font-bold uppercase tracking-widest text-zinc-400 dark:text-zinc-500 hover:text-zinc-600 dark:hover:text-zinc-300 transition-colors">&larr; Back to profile</a>
      <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight">All <span class="gradient-text">STAR Stories</span></h1>
      <p class="text-zinc-600 dark:text-zinc-400 leading-relaxed">
        The full set — engineering and community, situation through result. The profile page shows a curated few; this is everything.
      </p>
    </header>

    <!-- FILTERS -->
    <div id="filters" class="flex flex-wrap items-center justify-center gap-2 py-4 border-b border-zinc-200/50 dark:border-zinc-800"></div>

    <!-- STORY LIST -->
    <div id="story-list" class="space-y-6">
      <p class="text-center text-sm text-zinc-400 dark:text-zinc-500 font-mono">Loading stories&hellip;</p>
    </div>

    <!-- FOOTER -->
    <footer class="text-center pt-8 border-t border-zinc-200 dark:border-zinc-800 text-xs text-zinc-400 dark:text-zinc-500 font-mono">
      <p>Franky Barragan &middot; <a href="./" class="underline hover:text-zinc-600 dark:hover:text-zinc-300">Full profile</a> &middot; <a href="board.html" class="underline hover:text-zinc-600 dark:hover:text-zinc-300">How I think about community</a></p>
    </footer>

  </div>

<script>
  let allStories = [];
  let activeTag = 'all';

  function badgeClasses(active) {
    return active
      ? 'px-4 py-1.5 rounded-full text-xs font-bold border transition-all bg-zinc-900 dark:bg-white text-white dark:text-zinc-900 border-zinc-900 dark:border-white'
      : 'px-4 py-1.5 rounded-full text-xs font-bold border transition-all bg-transparent text-zinc-600 dark:text-zinc-400 border-zinc-200 dark:border-zinc-700 hover:border-zinc-400 dark:hover:border-zinc-500';
  }

  function renderFilters() {
    const tags = Array.from(new Set(allStories.flatMap(s => s.tags || [])));
    const el = document.getElementById('filters');
    el.innerHTML = ['all', ...tags].map(tag => {
      const label = tag === 'all' ? '[ All ]' : tag;
      return `<button onclick="setFilter('${tag}')" class="${badgeClasses(tag === activeTag)}">${label}</button>`;
    }).join('');
  }

  function setFilter(tag) {
    activeTag = tag;
    renderFilters();
    renderStories();
  }

  function renderStories() {
    const list = document.getElementById('story-list');
    const filtered = activeTag === 'all' ? allStories : allStories.filter(s => (s.tags || []).includes(activeTag));

    list.innerHTML = filtered.map(study => `
      <article class="bg-white dark:bg-zinc-900 border border-zinc-200/80 dark:border-zinc-800 rounded-xl shadow-sm p-6 md:p-8 space-y-4">
        <div class="border-b border-zinc-200 dark:border-zinc-800 pb-4">
          <span class="bg-zinc-100 dark:bg-zinc-800 text-zinc-800 dark:text-zinc-200 text-[10px] px-3 py-1 rounded-full font-bold uppercase tracking-wider border border-zinc-200 dark:border-zinc-700">${study.category || 'Story'}</span>
          <h3 class="text-2xl font-bold mt-1.5">${study.title}</h3>
          <p class="text-sm text-zinc-500 dark:text-zinc-400 mt-0.5">${study.subtitle || ''}</p>
        </div>
        <button onclick="this.nextElementSibling.classList.toggle('open')" class="text-xs font-semibold text-blue-600 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300 flex items-center space-x-1.5">
          <span>View Story</span>
        </button>
        <div class="star-body bg-zinc-50/50 dark:bg-zinc-950/50 border border-zinc-200 dark:border-zinc-800 rounded-xl p-5 space-y-4">
          <p class="text-sm text-zinc-700 dark:text-zinc-300"><strong class="uppercase text-[10px] tracking-widest text-zinc-400 dark:text-zinc-500 block mb-1">Situation</strong>${study.situation}</p>
          <p class="text-sm text-zinc-700 dark:text-zinc-300"><strong class="uppercase text-[10px] tracking-widest text-zinc-400 dark:text-zinc-500 block mb-1">Task</strong>${study.task}</p>
          <p class="text-sm text-zinc-700 dark:text-zinc-300"><strong class="uppercase text-[10px] tracking-widest text-zinc-400 dark:text-zinc-500 block mb-1">Action</strong>${study.action}</p>
          <p class="text-sm text-emerald-900 dark:text-emerald-300 font-medium bg-emerald-50 dark:bg-emerald-950/30 p-3 rounded-lg border border-emerald-100 dark:border-emerald-900"><strong class="uppercase text-[10px] tracking-widest text-emerald-700 dark:text-emerald-400 block mb-1">Result</strong>${study.result}</p>
          ${study.metrics ? `<div class="flex items-center space-x-2 text-emerald-800 dark:text-emerald-300 text-sm font-semibold font-mono">📈 ${study.metrics}</div>` : ''}
        </div>
      </article>
    `).join('') || `<p class="text-center text-sm text-zinc-400 dark:text-zinc-500 py-12">No stories match this filter.</p>`;
  }

  fetch('./case_studies.json')
    .then(r => r.json())
    .then(data => {
      allStories = data.items || [];
      renderFilters();
      renderStories();
    })
    .catch(() => {
      document.getElementById('story-list').innerHTML = `<p class="text-center text-sm text-red-500 py-12">Couldn't load case_studies.json — check it's in the same folder as this page.</p>`;
    });

  // Theme handling — same 'portfolio-theme' key as the rest of the site
  function applyTheme() {
    let mode = localStorage.getItem('portfolio-theme') || 'auto';
    let resolved = mode === 'auto' ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light') : mode;
    document.documentElement.classList.toggle('dark', resolved === 'dark');
    ['light', 'auto', 'dark'].forEach(m => {
      const btn = document.getElementById('btn-theme-' + m);
      if (btn) btn.className = 'p-2 rounded-full transition-colors' + (m === mode ? ' bg-zinc-900 dark:bg-white/20' : ' hover:bg-zinc-100 dark:hover:bg-zinc-800');
    });
  }
  function setThemeOverride(mode) {
    try { localStorage.setItem('portfolio-theme', mode); } catch (e) {}
    applyTheme();
  }
  applyTheme();
  if (window.matchMedia) {
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      if ((localStorage.getItem('portfolio-theme') || 'auto') === 'auto') applyTheme();
    });
  }
</script>

</body>
</html>
